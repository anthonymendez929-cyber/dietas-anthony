<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Nutricional - Anthony Méndez</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #120e0d; /* Fondo oscuro */
            padding: 20px; 
            color: #fff;
            margin: 0;
        }
        /* ESTILOS DEL LOGIN */
        .login-container {
            max-width: 350px;
            margin: 80px auto;
            background-color: #271f1d;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }
        .brand-title {
            font-size: 24px;
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .brand-subtitle {
            font-size: 13px;
            color: #c7b28d; /* Dorado oscuro */
            margin-top: 5px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #client-code {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-ingresar {
            width: 100%;
            padding: 15px;
            background-color: #b33928; /* Rojo oscuro */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-ingresar:hover { background-color: #922c1e; }

        /* ESTILOS DEL FORMULARIO (Oculto al inicio) */
        .tracking-container { 
            display: none; /* Se oculta hasta que validen la clave */
            max-width: 500px; 
            margin: 40px auto; 
            background-color: #271f1d; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        h2 { text-align: center; color: #fff; margin-top: 0;}
        .section { 
            margin-bottom: 20px; 
            padding: 15px; 
            border: 1px solid #4a3b35; 
            border-radius: 8px; 
            background-color: #1a110e;
        }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 14px;}
        input[type="number"] { 
            width: 100%; 
            padding: 10px; 
            margin-top: 5px; 
            border-radius: 6px; 
            border: 1px solid #4a3b35; 
            background-color: #271f1d;
            color: white;
            box-sizing: border-box;
        }
        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-top: 8px; 
            background: #271f1d;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #4a3b35;
        }
        .checkbox-group input { transform: scale(1.2); }
        .btn-dieta {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .btn-dieta:hover { background-color: #2980b9; }
        .btn-enviar { 
            width: 100%; 
            padding: 12px; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 10px; 
        }
        .btn-enviar:hover { background-color: #219150; }
        .alert {
            display: none;
            padding: 10px;
            background-color: #d4edda;
            color: #155724;
            border-radius: 6px;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<!-- 1. PANTALLA DE LOGIN -->
<div id="login-screen" class="login-container">
    <!-- REEMPLAZA "logo.png" POR EL NOMBRE EXACTO DE TU IMAGEN -->
    <img src="logo gym.jpeg" alt="Logo" class="logo">
    
    <h1 class="brand-title">PERSONAL TRAINER</h1>
    <p class="brand-subtitle">ANTHONY MÉNDEZ</p>
    
    <input type="text" id="client-code" placeholder="Clave de acceso">
    <button class="btn-ingresar" onclick="iniciarSistema()">INGRESAR AL SISTEMA</button>
</div>

<!-- 2. PANTALLA DE SEGUIMIENTO (Oculta hasta entrar) -->
<div id="tracking-screen" class="tracking-container">
    <h2>Bienvenido a tu Plan</h2>
    
    <!-- Botón para abrir el link de Drive -->
    <button class="btn-dieta" onclick="verDieta()">Ver Mi Plan Nutricional</button>

    <div class="section">
        <h3 style="margin-top: 0; border-bottom: 1px solid #4a3b35; padding-bottom: 5px;">Medidas de Hoy</h3>
        <label>Peso (kg):</label>
        <input type="number" id="peso" placeholder="Ej. 75.5" step="0.1">

        <label>Talla / Estatura (cm):</label>
        <input type="number" id="estatura" placeholder="Ej. 175">
    </div>

    <div class="section">
        <h3 style="margin-top: 0; border-bottom: 1px solid #4a3b35; padding-bottom: 5px;">Adherencia a la Dieta</h3>

        <label>Marca las comidas que completaste:</label>
        <div class="checkbox-group"><input type="checkbox" id="desayuno"> Desayuno</div>
        <div class="checkbox-group"><input type="checkbox" id="almuerzo"> Almuerzo</div>
        <div class="checkbox-group"><input type="checkbox" id="cena"> Cena</div>
        <div class="checkbox-group"><input type="checkbox" id="snack"> Snacks / Colaciones</div>

        <label>Agua consumida (Litros):</label>
        <input type="number" id="agua" placeholder="Ej. 2.5" step="0.1">

        <label>Horas de sueño anoche:</label>
        <input type="number" id="sueno" placeholder="Ej. 7.5" step="0.5">
    </div>

    <button class="btn-enviar" onclick="guardarDatos()">Enviar Reporte Diario</button>
    
    <div class="alert" id="success-message">
        ¡Reporte enviado! Tu entrenador ya puede revisar tu progreso.
    </div>
</div>

<script>
    // Variable para recordar quién entró
    let codigoIngresado = "";

    // AQUÍ PONES TUS CÓDIGOS Y LINKS
    const baseDeDatosDietas = {
        "ANTHONY2026": "https://docs.google.com/spreadsheets/d/12nOBLbf9-G6DKA4Jf2GeFBnf3gAdK9gv..."
       
    };

    function iniciarSistema() {
        const inputCodigo = document.getElementById('client-code').value.trim().toUpperCase();
        
        if (inputCodigo === "") {
            alert("Por favor, ingresa tu clave de acceso.");
            return;
        }

        // Si el código existe en tu base de datos
        if (baseDeDatosDietas[inputCodigo]) {
            codigoIngresado = inputCodigo; 
            
            // Magia visual: Esconde el login y muestra el formulario
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('tracking-screen').style.display = 'block';
        } else {
            alert("Código incorrecto o no encontrado. Por favor verifica.");
        }
    }

    function verDieta() {
        if (baseDeDatosDietas[codigoIngresado]) {
            window.open(baseDeDatosDietas[codigoIngresado], "_blank");
        }
    }

    function guardarDatos() {
        const peso = document.getElementById('peso').value;
        const agua = document.getElementById('agua').value;
        const sueno = document.getElementById('sueno').value;

        const comidas = {
            desayuno: document.getElementById('desayuno').checked,
            almuerzo: document.getElementById('almuerzo').checked,
            cena: document.getElementById('cena').checked,
            snack: document.getElementById('snack').checked
        };

        const reporteDiario = {
            cliente: codigoIngresado,
            fecha: new Date().toLocaleDateString(),
            peso: peso,
            agua: agua,
            sueno: sueno,
            comidasCompletadas: comidas
        };

        console.log("Datos listos para enviar:", reporteDiario);
        
        document.getElementById('success-message').style.display = 'block';
        setTimeout(() => {
            document.getElementById('success-message').style.display = 'none';
        }, 4000);
    }
</script>

</body>
</html>
